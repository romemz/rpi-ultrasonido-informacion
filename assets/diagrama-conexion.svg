<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de conexion HC-SR04 y Raspberry Pi</title>
  <desc id="desc">Diagrama con pines VCC, TRIG, ECHO y GND, divisor de voltaje de 1k y 2k, y conexion a Raspberry Pi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#0f2944"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13314f"/>
      <stop offset="1" stop-color="#0f243c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 600 22px 'Orbitron', 'Segoe UI', sans-serif; letter-spacing: 1px; fill: #dff6ff; }
      .small { font: 500 17px 'Exo 2', 'Segoe UI', sans-serif; fill: #b8d8eb; }
      .pin { font: 700 17px 'Orbitron', 'Segoe UI', sans-serif; fill: #ffffff; }
      .val { font: 600 16px 'Orbitron', 'Segoe UI', sans-serif; fill: #00e5ff; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <g stroke="#1f466c" stroke-width="1" opacity="0.35">
    <path d="M0 70h1200M0 140h1200M0 210h1200M0 280h1200M0 350h1200M0 420h1200M0 490h1200M0 560h1200M0 630h1200M0 700h1200"/>
    <path d="M100 0v760M200 0v760M300 0v760M400 0v760M500 0v760M600 0v760M700 0v760M800 0v760M900 0v760M1000 0v760M1100 0v760"/>
  </g>

  <text x="600" y="60" text-anchor="middle" class="label" fill="#00e5ff">DIAGRAMA DE CONEXION</text>
  <text x="600" y="92" text-anchor="middle" class="small">HC-SR04 + Raspberry Pi + divisor de voltaje</text>

  <g transform="translate(90 170)">
    <rect x="0" y="0" width="360" height="370" rx="18" fill="url(#panel)" stroke="#2a5f8d" stroke-width="3"/>
    <text x="180" y="42" text-anchor="middle" class="label">SENSOR HC-SR04</text>
    <circle cx="110" cy="120" r="44" fill="#193f62" stroke="#3d7cb0" stroke-width="4"/>
    <circle cx="250" cy="120" r="44" fill="#193f62" stroke="#3d7cb0" stroke-width="4"/>
    <circle cx="110" cy="120" r="26" fill="#8fd3ff" opacity="0.8"/>
    <circle cx="250" cy="120" r="26" fill="#8fd3ff" opacity="0.8"/>

    <rect x="64" y="258" width="232" height="68" rx="10" fill="#10273f" stroke="#2c6ea0"/>
    <g transform="translate(82 302)">
      <rect width="42" height="14" rx="3" fill="#f44336"/>
      <rect x="52" width="42" height="14" rx="3" fill="#ffeb3b"/>
      <rect x="104" width="42" height="14" rx="3" fill="#4caf50"/>
      <rect x="156" width="42" height="14" rx="3" fill="#607d8b"/>
    </g>
    <text x="94" y="285" class="pin">VCC</text>
    <text x="145" y="285" class="pin">TRIG</text>
    <text x="199" y="285" class="pin">ECHO</text>
    <text x="257" y="285" class="pin">GND</text>
  </g>

  <g transform="translate(700 132)">
    <rect x="0" y="0" width="420" height="450" rx="18" fill="url(#panel)" stroke="#2a5f8d" stroke-width="3"/>
    <text x="210" y="40" text-anchor="middle" class="label">RASPBERRY PI</text>

    <rect x="56" y="82" width="306" height="320" rx="14" fill="#12314c" stroke="#3a7fb4"/>

    <g transform="translate(84 124)">
      <rect width="24" height="18" fill="#f44336"/>
      <text x="36" y="15" class="small">5V (Pin 2)</text>

      <rect y="58" width="24" height="18" fill="#ffeb3b"/>
      <text x="36" y="73" class="small">GPIO23 (Pin 16)</text>

      <rect y="116" width="24" height="18" fill="#4caf50"/>
      <text x="36" y="131" class="small">GPIO24 (Pin 18)</text>

      <rect y="174" width="24" height="18" fill="#607d8b"/>
      <text x="36" y="189" class="small">GND (Pin 6)</text>
    </g>

    <rect x="262" y="144" width="74" height="30" rx="6" fill="#182f45" stroke="#34b6ff"/>
    <text x="299" y="164" text-anchor="middle" class="val">R1 1k</text>
    <rect x="262" y="202" width="74" height="30" rx="6" fill="#182f45" stroke="#34b6ff"/>
    <text x="299" y="222" text-anchor="middle" class="val">R2 2k</text>
  </g>

  <g fill="none" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
    <path d="M386 486 H760" stroke="#f44336"/>
    <path d="M438 486 V314" stroke="#f44336" opacity="0.2"/>

    <path d="M438 486 H728 V372" stroke="#ffeb3b"/>

    <path d="M490 486 H920 V278" stroke="#4caf50"/>
    <path d="M490 486 H882 V306" stroke="#4caf50" opacity="0.45"/>

    <path d="M542 486 H770" stroke="#607d8b"/>
    <path d="M770 486 V364" stroke="#607d8b" opacity="0.25"/>
  </g>

  <g>
    <rect x="508" y="318" width="148" height="40" rx="10" fill="#10273f" stroke="#2e6c9d"/>
    <text x="582" y="344" text-anchor="middle" class="small">DIVISOR</text>

    <rect x="504" y="364" width="156" height="56" rx="10" fill="#0c2136" stroke="#2a5f8d"/>
    <text x="582" y="389" text-anchor="middle" class="small">5V -> 3.3V</text>
    <text x="582" y="410" text-anchor="middle" class="small">ECHO SEGURO</text>
  </g>

  <rect x="36" y="684" width="1128" height="50" rx="12" fill="#0f243b" stroke="#2d6a99"/>
  <text x="68" y="715" class="small">VCC: rojo | TRIG: amarillo | ECHO: verde (con divisor) | GND: gris</text>
</svg>
